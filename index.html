<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人导航</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234b77d1'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z'/%3E%3C/svg%3E">
    <script>
        const savedTheme = localStorage.getItem('app_theme_mode');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && systemDark)) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    </script>
</head>
<body class="antialiased min-h-screen bg-page dark:bg-page-dark text-gray-900 dark:text-gray-200"
      x-data
      :class="{ 'dark': $store.ui.isDark }">

    <div x-cloak class="max-w-6xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row justify-between items-center gap-5 mb-8">
            <h1 class="text-xl font-bold flex items-center gap-2.5 select-none tracking-tight">
                <template x-if="$store.sync.config.owner">
                    <a :href="`https://github.com/${$store.sync.config.owner}/${$store.sync.config.repo}`"
                       target="_blank" rel="noopener noreferrer" title="访问仓库"
                       class="flex-shrink-0 hover:opacity-80 transition-opacity">
                        <img :src="`https://github.com/${$store.sync.config.owner}.png`"
                             class="w-8 h-8 rounded-full border border-gray-200 dark:border-gray-700 shadow-sm" alt="Avatar">
                    </a>
                </template>
                <template x-if="!$store.sync.config.owner">
                    <svg class="w-8 h-8 text-primary dark:text-primary-light fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm2.59-12.41L14.29 14l-6.41 1.71c-.2.05-.41-.15-.36-.36l1.71-6.41 6.36-1.35z"/></svg>
                </template>
                <span x-text="$store.data.config.title || '个人导航'"></span>
            </h1>

            <div class="relative w-full md:w-1/2 max-w-md group" x-data="{ performSearch() { if($store.ui.searchQuery) { window.open('https://www.bing.com/search?q=' + encodeURIComponent($store.ui.searchQuery)); $store.ui.searchQuery = ''; } } }">
                <input type="text" x-model="$store.ui.searchQuery" @keydown.enter="performSearch"
                       class="w-full h-11 pl-11 pr-4 rounded-full bg-surface dark:bg-surface-dark border-none outline-none focus:ring-2 focus:ring-primary dark:focus:ring-primary-light transition-all placeholder-gray-400 dark:placeholder-gray-500" placeholder="搜索...">
                <div class="absolute left-4 inset-y-0 flex items-center text-gray-400 dark:text-gray-500 cursor-pointer hover:text-primary transition-colors" @click="performSearch">
                     <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </div>
            </div>

            <div class="flex items-center gap-2.5">
                <button @click="$store.ui.toggleTheme()" class="w-9 h-9 rounded-full bg-surface dark:bg-surface-dark hover:bg-gray-200 dark:hover:bg-surface-darkHover flex items-center justify-center transition-colors text-gray-600 dark:text-gray-300">
                    <svg x-show="!$store.ui.isDark" class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/></svg>
                    <svg x-show="$store.ui.isDark" class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
                </button>

                <button @click="$store.ui.toggleEditMode()"
                        class="px-4 py-2 rounded-full text-sm font-bold transition-all flex items-center gap-1.5 select-none"
                        :class="$store.ui.isEditMode ? 'bg-primary text-white dark:bg-primary-light dark:text-page-dark' : 'bg-surface dark:bg-surface-dark hover:bg-gray-200 dark:hover:bg-surface-darkHover'">
                    <span x-text="$store.ui.isEditMode ? '完成' : '编辑'"></span>
                </button>

                <div class="flex items-center gap-1 bg-surface dark:bg-surface-dark rounded-full p-1 border border-transparent dark:border-border-dark">
                     <button @click="$store.ui.openModal('upload_confirm')" title="上传到云端" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-white/10 text-gray-500 hover:text-primary dark:hover:text-primary-light transition-all">
                        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                     </button>
                     <button @click="$store.ui.openModal('download_confirm')" title="从云端恢复" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-white/10 text-gray-500 hover:text-primary dark:hover:text-primary-light transition-all">
                        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                     </button>
                     <button @click="$store.ui.openModal('sync')" title="设置" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-white/10 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-all">
                        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.04.17 0 .36.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.04-.22 0-.41-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                     </button>
                </div>
            </div>
        </header>

        <main id="groups-container" class="space-y-6" :class="{ 'editing': $store.ui.isEditMode }">
            <template x-for="(group, gIndex) in $store.data.groups" :key="group.id">
                <section class="group-section" :data-id="group.id" :data-index="gIndex">
                    <div class="flex items-center gap-2 mb-2 pl-1 h-6 group/header">
                        <div x-show="$store.ui.isEditMode" class="group-handle cursor-grab text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 px-1">
                            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                        </div>
                        <div class="flex-1">
                            <input x-show="$store.ui.isEditMode" x-model.lazy="group.name" @change="$store.data.persist()" class="bg-transparent border-b border-primary dark:border-primary-light outline-none text-base font-bold w-full max-w-xs p-0 text-inherit">
                            <h2 x-show="!$store.ui.isEditMode" class="text-sm font-bold text-gray-500 dark:text-gray-400 select-none uppercase tracking-wider" x-text="group.name"></h2>
                        </div>
                        <button x-show="$store.ui.isEditMode" @click="$store.data.deleteGroup(gIndex)" class="text-red-400 hover:text-red-600 text-xs px-2 py-0.5 rounded hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">删除</button>
                    </div>

                    <div class="site-list grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">
                        <template x-for="(site, sIndex) in group.sites" :key="site.id">
                            <div class="relative group/site" :data-id="site.id">
                                <a :href="$store.ui.isEditMode ? 'javascript:void(0)' : site.url" :target="$store.ui.isEditMode ? '' : '_blank'"
                                   class="site-card group/card"
                                   @click="$store.ui.isEditMode && $store.ui.openModal('site', { groupIdx: gIndex, siteIdx: sIndex, site: site })">
                                    
                                    <div class="card-tray">
                                        <template x-if="site.icon">
                                            <img :src="site.icon" class="site-icon" @error="$el.style.display='none'">
                                        </template>
                                        <template x-if="!site.icon">
                                            <img x-favicon="site.url" class="site-icon">
                                        </template>
                                    </div>

                                    <div class="flex-1 flex flex-col justify-center px-2 -ml-3.5 min-w-0 z-10">
                                        <div class="text-sm font-bold truncate tracking-tight text-gray-800 dark:text-gray-200" x-text="site.name"></div>
                                    </div>
                                </a>

                                <button x-show="$store.ui.isEditMode" @click.stop="$store.data.deleteSite(gIndex, sIndex)" class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full flex items-center justify-center shadow z-20 hover:scale-110 transition-transform">
                                    <svg class="w-2.5 h-2.5 fill-current" viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
                                </button>
                            </div>
                        </template>
                        
                        <button x-show="$store.ui.isEditMode" @click="$store.ui.openModal('site', { groupIdx: gIndex, siteIdx: -1 })" 
                                class="site-card border-dashed border-gray-300 dark:border-gray-700 bg-transparent text-gray-400 hover:text-primary hover:border-primary">
                            <div class="card-tray add-btn-tray"></div>
                            <div class="relative z-10 flex items-center gap-2 pr-1 -ml-8">
                                <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                                <span class="text-xs font-bold">Add</span>
                            </div>
                        </button>
                    </div>
                </section>
            </template>
            
            <div x-show="$store.ui.isEditMode" class="py-2">
                <button @click="$store.ui.openModal('group')" class="w-full py-2.5 rounded-xl border border-dashed border-gray-300 dark:border-gray-600 text-gray-500 text-sm hover:border-primary hover:text-primary transition-all flex items-center justify-center gap-2">
                    新建分组
                </button>
            </div>
        </main>

        <div x-show="$store.ui.modal.type === 'site'" class="fixed inset-0 z-[100] flex items-center justify-center px-4" style="display: none;">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="$store.ui.closeModal()"></div>
            <div class="bg-white dark:bg-surface-dark rounded-2xl shadow-2xl w-full max-w-sm relative z-10 p-6"
                 x-data="{ form: { name: '', url: '', icon: '' } }"
                 x-effect="if($store.ui.modal.type === 'site') form = $store.ui.modal.context.site ? {...$store.ui.modal.context.site} : { name: '', url: '', icon: '' }">
                <h3 class="text-lg font-bold mb-5 dark:text-gray-200">网站信息</h3>
                <div class="space-y-4">
                    <input x-model="form.name" class="w-full px-4 py-2 bg-surface dark:bg-black/30 rounded-xl outline-none focus:ring-2 focus:ring-primary dark:text-gray-200" placeholder="名称">
                    <input x-model="form.url" class="w-full px-4 py-2 bg-surface dark:bg-black/30 rounded-xl outline-none focus:ring-2 focus:ring-primary dark:text-gray-200" placeholder="https://...">
                    <input x-model="form.icon" class="w-full px-4 py-2 bg-surface dark:bg-black/30 rounded-xl outline-none focus:ring-2 focus:ring-primary dark:text-gray-200" placeholder="图标 URL (可选)">
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button @click="$store.ui.closeModal()" class="px-4 py-2 text-gray-500 text-sm font-bold">取消</button>
                    <button @click="if(form.name){ if(!form.url.startsWith('http')) form.url='https://'+form.url; if($store.ui.modal.context.siteIdx>=0) $store.data.updateSite($store.ui.modal.context.groupIdx, $store.ui.modal.context.siteIdx, form); else $store.data.addSite($store.ui.modal.context.groupIdx, form); $store.ui.closeModal(); }" class="px-5 py-2 bg-primary text-white rounded-xl text-sm font-bold">保存</button>
                </div>
            </div>
        </div>

        <div x-show="$store.ui.modal.type === 'group'" class="fixed inset-0 z-[100] flex items-center justify-center px-4" style="display: none;" x-data="{ name: '' }">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="$store.ui.closeModal()"></div>
            <div class="bg-white dark:bg-surface-dark rounded-2xl shadow-2xl w-full max-w-sm relative z-10 p-6">
                <h3 class="text-lg font-bold mb-5 dark:text-gray-200">新建分组</h3>
                <input x-model="name" class="w-full px-4 py-2 bg-surface dark:bg-black/30 rounded-xl outline-none focus:ring-2 focus:ring-primary dark:text-gray-200" placeholder="分组名称">
                <div class="flex justify-end gap-3 mt-6">
                    <button @click="$store.ui.closeModal()" class="px-4 py-2 text-gray-500 text-sm font-bold">取消</button>
                    <button @click="if(name){ $store.data.addGroup(name); name=''; $store.ui.closeModal(); }" class="px-5 py-2 bg-primary text-white rounded-xl text-sm font-bold">确定</button>
                </div>
            </div>
        </div>

        <div x-show="$store.ui.modal.type === 'sync'" class="fixed inset-0 z-[100] flex items-center justify-center px-4" style="display: none;">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="$store.ui.closeModal()"></div>
            <div class="bg-white dark:bg-surface-dark rounded-2xl shadow-2xl w-full max-w-sm relative z-10 p-6">
                <h3 class="text-lg font-bold mb-5 dark:text-gray-200">GitHub 设置</h3>
                
                <div x-show="$store.sync.status === 'idle' || $store.sync.status === 'error'" class="space-y-4">
                    <input x-model="$store.sync.config.owner" class="w-full px-4 py-2 bg-surface dark:bg-black/30 rounded-xl outline-none focus:ring-2 focus:ring-primary text-sm dark:text-gray-200" placeholder="Owner (用户名)">
                    <input x-model="$store.sync.config.repo" class="w-full px-4 py-2 bg-surface dark:bg-black/30 rounded-xl outline-none focus:ring-2 focus:ring-primary text-sm dark:text-gray-200" placeholder="Repo (仓库名)">
                    <input x-model="$store.sync.config.token" type="password" class="w-full px-4 py-2 bg-surface dark:bg-black/30 rounded-xl outline-none focus:ring-2 focus:ring-primary text-sm dark:text-gray-200" placeholder="Token">
                    <div x-show="$store.sync.status === 'error'" class="text-red-500 text-xs" x-text="$store.sync.message"></div>
                    <div class="flex justify-end mt-4">
                        <button @click="$store.sync.saveConfig($store.sync.config); $store.ui.closeModal()" class="px-5 py-2 bg-primary text-white rounded-xl text-sm font-bold">保存</button>
                    </div>
                </div>

                <div x-show="$store.sync.status === 'syncing'" class="py-8 text-center">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-gray-100 border-t-primary mb-2"></div>
                    <p class="text-sm text-gray-500" x-text="$store.sync.message"></p>
                </div>
                
                <div x-show="$store.sync.status === 'success'" class="py-8 text-center text-green-500">
                    <p class="font-bold">操作成功</p>
                </div>
            </div>
        </div>
        
        <div x-show="$store.ui.modal.type === 'upload_confirm'" class="fixed inset-0 z-[100] flex items-center justify-center px-4" style="display: none;">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="$store.ui.closeModal()"></div>
            <div class="bg-white dark:bg-surface-dark rounded-2xl shadow-2xl w-full max-w-sm relative z-10 p-6">
                <h3 class="text-lg font-bold mb-2 dark:text-gray-200">确认上传</h3>
                <p class="text-gray-500 text-sm mb-6">这将覆盖 GitHub 上的配置文件。</p>
                <div class="flex justify-end gap-3">
                    <button @click="$store.ui.closeModal()" class="px-4 py-2 text-gray-500 text-sm font-bold">取消</button>
                    <button @click="$store.sync.push()" class="px-5 py-2 bg-primary text-white rounded-xl text-sm font-bold">上传</button>
                </div>
            </div>
        </div>

        <div x-show="$store.ui.modal.type === 'download_confirm'" class="fixed inset-0 z-[100] flex items-center justify-center px-4" style="display: none;">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" @click="$store.ui.closeModal()"></div>
            <div class="bg-white dark:bg-surface-dark rounded-2xl shadow-2xl w-full max-w-sm relative z-10 p-6">
                <h3 class="text-lg font-bold mb-2 dark:text-gray-200">从云端恢复</h3>
                <p class="text-gray-500 text-sm mb-6">确定从 GitHub 下载配置吗？<br>这将覆盖当前所有本地修改。</p>
                <div class="flex justify-end gap-3">
                    <button @click="$store.ui.closeModal()" class="px-4 py-2 text-gray-500 text-sm font-bold">取消</button>
                    <button @click="$store.sync.pull()" class="px-5 py-2 bg-primary text-white rounded-xl text-sm font-bold">确定下载</button>
                </div>
            </div>
        </div>

    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
